name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.2)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Build wheels
      run: poetry build

    - name: Generate release notes
      id: release_notes
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "## KillerTools $TAG" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "See [CHANGELOG.md](https://github.com/VoxHash/KillerTools/blob/$TAG/CHANGELOG.md) for details." >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: ${{ steps.release_notes.outputs.notes }}
        files: dist/*.whl
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    needs: release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Generate icons
      run: poetry run python scripts/export_icons.py

    - name: Install PyInstaller
      run: poetry add pyinstaller --group dev

    - name: Build CLI binary
      run: poetry run pyinstaller --clean --noconfirm apps/cli/main.py --name killertools-cli --onefile --distpath dist/binaries

    - name: Build TUI binary
      run: poetry run pyinstaller --clean --noconfirm apps/tui/main.py --name killertools-tui --onefile --distpath dist/binaries

    - name: Build GUI binary
      run: poetry run pyinstaller --clean --noconfirm apps/gui/main.py --name killertools-gui --onefile --windowed --distpath dist/binaries

    - name: Create release archive
      run: |
        New-Item -ItemType Directory -Force -Path release
        Copy-Item dist\binaries\* release\
        if (Test-Path assets\icons\*.png) { Copy-Item assets\icons\*.png release\ }
        if (Test-Path assets\icons\*.ico) { Copy-Item assets\icons\*.ico release\ }
        Compress-Archive -Path release\* -DestinationPath killertools-${{ github.ref_name }}-windows.zip

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: killertools-${{ github.ref_name }}-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Binaries
    runs-on: macos-latest
    needs: release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Generate icons
      run: poetry run python scripts/export_icons.py

    - name: Install PyInstaller
      run: poetry add pyinstaller --group dev

    - name: Build CLI binary
      run: poetry run pyinstaller --clean --noconfirm apps/cli/main.py --name killertools-cli --onefile --distpath dist/binaries

    - name: Build TUI binary
      run: poetry run pyinstaller --clean --noconfirm apps/tui/main.py --name killertools-tui --onefile --distpath dist/binaries

    - name: Build GUI binary
      run: poetry run pyinstaller --clean --noconfirm apps/gui/main.py --name killertools-gui --onefile --windowed --distpath dist/binaries

    - name: Create release archive
      run: |
        mkdir -p release
        cp dist/binaries/* release/
        if [ -d assets/icons ]; then
          cp assets/icons/*.png assets/icons/*.icns release/ 2>/dev/null || true
        fi
        cd release
        zip -r ../killertools-${{ github.ref_name }}-macos.zip .
        cd ..

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: killertools-${{ github.ref_name }}-macos.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    needs: release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Generate icons
      run: poetry run python scripts/export_icons.py

    - name: Install PyInstaller
      run: poetry add pyinstaller --group dev

    - name: Build CLI binary
      run: poetry run pyinstaller --clean --noconfirm apps/cli/main.py --name killertools-cli --onefile --distpath dist/binaries

    - name: Build TUI binary
      run: poetry run pyinstaller --clean --noconfirm apps/tui/main.py --name killertools-tui --onefile --distpath dist/binaries

    - name: Build GUI binary
      run: poetry run pyinstaller --clean --noconfirm apps/gui/main.py --name killertools-gui --onefile --windowed --distpath dist/binaries

    - name: Create release archive
      run: |
        mkdir -p release
        cp dist/binaries/* release/
        if [ -d assets/icons ]; then
          cp assets/icons/*.png release/ 2>/dev/null || true
        fi
        cd release
        zip -r ../killertools-${{ github.ref_name }}-linux.zip .
        cd ..

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: killertools-${{ github.ref_name }}-linux.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
